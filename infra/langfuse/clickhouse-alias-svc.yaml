apiVersion: v1
kind: Service
metadata:
  name: agentshield-langfuse-clickhouse
  namespace: agentshield-platform
  labels:
    app.kubernetes.io/managed-by: agentshield
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/instance: agentshield
    app.kubernetes.io/component: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: tcp
      port: 9000
      targetPort: 9000
    - name: native
      port: 9004
      targetPort: 9004
