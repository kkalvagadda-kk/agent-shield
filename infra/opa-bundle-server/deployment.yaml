apiVersion: apps/v1
kind: Deployment
metadata:
  name: opa-bundle-server
  namespace: agentshield-platform
  labels:
    app: opa-bundle-server
    component: authorization
spec:
  replicas: 2
  selector:
    matchLabels:
      app: opa-bundle-server
  template:
    metadata:
      labels:
        app: opa-bundle-server
        component: authorization
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: policy
              mountPath: /usr/share/nginx/html/bundles/agentshield/policy.rego
              subPath: policy.rego
              readOnly: true
            - name: data
              mountPath: /usr/share/nginx/html/bundles/agentshield/data.json
              subPath: data.json
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /bundles/agentshield/data.json
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /bundles/agentshield/data.json
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: policy
          configMap:
            name: opa-bundle-policy
        - name: data
          configMap:
            name: opa-bundle-data
        - name: nginx-conf
          configMap:
            name: opa-bundle-server-nginx-conf
