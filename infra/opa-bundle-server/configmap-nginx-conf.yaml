apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-bundle-server-nginx-conf
  namespace: agentshield-platform
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;

        # OPA sidecars poll this path — it's a single gzipped bundle tarball file.
        location = /bundles/agentshield {
            add_header Cache-Control "no-cache, must-revalidate";
            default_type application/gzip;
            try_files $uri =404;
        }

        location /health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
