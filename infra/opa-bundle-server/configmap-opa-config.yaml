apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-sidecar-config
  namespace: agents-platform
  annotations:
    # Shared by all agent pods. Mounted at /config/opa-config.yaml in the OPA sidecar.
    # Configures bundle polling from the central opa-bundle-server service.
data:
  opa-config.yaml: |
    services:
      - name: bundle-server
        url: http://opa-bundle-server.agentshield-platform

    bundles:
      agentshield:
        service: bundle-server
        resource: /bundles/agentshield
        polling:
          min_delay_seconds: 30
          max_delay_seconds: 60

    decision_logs:
      console: true
