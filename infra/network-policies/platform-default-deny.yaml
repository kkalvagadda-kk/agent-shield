# Default-deny all ingress AND egress in agentshield-platform namespace.
# This is the baseline policy; platform-allow-ingress.yaml opens specific ports.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: platform-default-deny
  namespace: agentshield-platform
  labels:
    app.kubernetes.io/managed-by: agentshield
    agentshield.io/policy-type: default-deny
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
