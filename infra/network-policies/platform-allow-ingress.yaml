---
# 3b. Allow Presidio Analyzer ingress from Safety Orchestrator on port 3000
#     Allow Presidio Anonymizer ingress from Safety Orchestrator on port 3001
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-presidio-from-safety-orchestrator
  namespace: agentshield-platform
  labels:
    app.kubernetes.io/managed-by: agentshield
spec:
