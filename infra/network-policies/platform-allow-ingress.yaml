# Allow-ingress NetworkPolicy for agentshield-platform namespace.
# Covers all required service-to-service communication within the platform.
# Apply after platform-default-deny.yaml.

---
# 1. Allow Envoy ingress from anywhere on 443 and 80 (external traffic entry point)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-envoy-external-ingress
  namespace: agentshield-platform
  labels:
    app.kubernetes.io/managed-by: agentshield
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: envoy-gateway
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80

---
# 2a. Allow Safety Orchestrator ingress from Envoy on port 8080
#     Safety acts as network-enforced input proxy — all /chat requests come from Envoy first
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-safety-orchestrator-from-envoy
  namespace: agentshield-platform
  labels:
    app.kubernetes.io/managed-by: agentshield
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: safety-orchestrator
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: envoy-gateway
      ports:
        - protocol: TCP
          port: 8080

---
# 2b. Allow Safety Orchestrator ingress from agent pods on port 8080
#     Agents call Safety for output scanning (after generating a response)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-safety-orchestrator-from-agents
  namespace: agentshield-platform
  labels:
    app.kubernetes.io/managed-by: agentshield
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: safety-orchestrator
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              agentshield.io/namespace-type: agents
          podSelector:
            matchLabels:
              agentshield.io/role: agent
      ports:
        - protocol: TCP
          port: 8080

---
# 2c. Allow Safety Orchestrator egress to agent pods in agents-{team} namespaces on port 8080
#     After a clean input scan, Safety proxies the sanitized request to the correct agent pod
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-safety-orchestrator-egress-to-agents
  namespace: agentshield-platform
  labels:
    app.kubernetes.io/managed-by: agentshield
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: safety-orchestrator
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              agentshield.io/namespace-type: agents
          podSelector:
            matchLabels:
              agentshield.io/role: agent
      ports:
        - protocol: TCP
          port: 8080

---
# 3a. Allow LLM Guard ingress from Safety Orchestrator on port 8000
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-llm-guard-from-safety-orchestrator
