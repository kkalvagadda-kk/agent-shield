---
# 8. Allow all platform pods egress to kube-dns (UDP and TCP port 53)
#    kube-dns runs in kube-system namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-platform-egress-dns
  namespace: agentshield-platform
  labels:
    app.kubernetes.io/managed-by: agentshield
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# 9a. Allow Portkey ingress from agent pods on port 8787
#     Agents configure OPENAI_BASE_URL=http://portkey:8787/v1 — all LLM calls route through Portkey
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-portkey-from-agents
  namespace: agentshield-platform
  labels:
    app.kubernetes.io/managed-by: agentshield
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: portkey
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              agentshield.io/namespace-type: agents
          podSelector:
            matchLabels:
              agentshield.io/role: agent
      ports:
        - protocol: TCP
          port: 8787

---
# 9b. Allow Portkey egress to external LLM providers over HTTPS (port 443)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-portkey-egress-llm-providers
  namespace: agentshield-platform
  labels:
    app.kubernetes.io/managed-by: agentshield
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: portkey
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 443
