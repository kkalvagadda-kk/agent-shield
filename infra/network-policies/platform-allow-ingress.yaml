    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: safety-orchestrator
      ports:
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 3001

---
# 3c. Allow NeMo Guardrails ingress from Safety Orchestrator on port 8000
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nemo-from-safety-orchestrator
  namespace: agentshield-platform
  labels:
    app.kubernetes.io/managed-by: agentshield
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: nemo
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: safety-orchestrator
      ports:
        - protocol: TCP
          port: 8000

---
# 4. Allow Registry API ingress from Envoy, Appsmith, Deploy Controller, and agent pods on port 8000
#    Agent pods call Registry API to: POST /approvals (HITL), GET /tools (tool lookup), POST /resume
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-registry-api-ingress
  namespace: agentshield-platform
  labels:
    app.kubernetes.io/managed-by: agentshield
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: registry-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: envoy-gateway
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: appsmith
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: deploy-controller
        - namespaceSelector:
            matchLabels:
              agentshield.io/namespace-type: agents
          podSelector:
            matchLabels:
              agentshield.io/role: agent
      ports:
        - protocol: TCP
          port: 8000

---
