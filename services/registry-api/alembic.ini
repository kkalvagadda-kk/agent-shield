# A generic, single database configuration.

[alembic]
# Path to migration scripts, relative to this file.
script_location = alembic

# Prepend the service root to sys.path so `from models import Base` works.
prepend_sys_path = .

# Migration file naming: YYYYMMDD_<revid>_<slug>.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Separator between version paths (for multi-root setups).
version_path_separator = os

# The actual URL is injected programmatically in alembic/env.py from settings.
# This placeholder satisfies Alembic's ini parser; it is never used at runtime.
sqlalchemy.url = postgresql+asyncpg://placeholder/agentshield


# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
# WARNING keeps SQL statements out of migration output.
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
