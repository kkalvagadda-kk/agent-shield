{{- if (index .Values "langfuse" "enabled") }}
# Post-install/upgrade Job that creates the `langfuse` database if it doesn't exist.
# The PostgreSQL initdb scripts in the postgresql sub-chart only run on the very
# first PVC init, so this hook ensures the DB is present even when the PVC was
# pre-formatted or the initdb scripts were skipped.
#
# NOTE: this MUST be a post-install hook, not pre-install. Postgres is a normal
# chart resource that Helm only creates after all pre-install hooks succeed — so
# a pre-install hook waiting on Postgres deadlocks on a fresh install (the hook
# waits for a Postgres that can't deploy until the hook finishes). Running it
# post-install lets Postgres come up first; the retry loop below then waits for
# readiness before creating the langfuse DB.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-langfuse-db-init
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-init
          image: postgres:16-alpine
          command:
            - /bin/sh
            - -c
            - |
              set -e
              PG_URL="postgresql://${PG_USER}:${PG_PASS}@${PG_HOST}:5432/postgres"

              echo "Waiting for PostgreSQL..."
              until psql "${PG_URL}" -c "SELECT 1" -q 2>/dev/null; do
                echo "  not ready yet, retrying..."
                sleep 3
              done

              echo "Creating database langfuse (idempotent)..."
              psql "${PG_URL}" -c "CREATE DATABASE langfuse;" 2>/dev/null \
                && echo "  langfuse database created." \
                || echo "  langfuse database already exists, ok."

              echo "Ensuring langfuse_user has access..."
              psql "${PG_URL}" -c "CREATE ROLE langfuse_user WITH LOGIN;" 2>/dev/null || true
              psql "${PG_URL}" -c "GRANT ALL PRIVILEGES ON DATABASE langfuse TO langfuse_user;" 2>/dev/null || true
              psql "postgresql://${PG_USER}:${PG_PASS}@${PG_HOST}:5432/langfuse" \
                -c "GRANT ALL ON SCHEMA public TO langfuse_user;" 2>/dev/null || true

              echo "DB init complete."
          env:
            - name: PG_HOST
              value: {{ .Release.Name }}-postgresql
            - name: PG_USER
              value: postgres
            - name: PG_PASS
              valueFrom:
                secretKeyRef:
                  name: postgres-passwords
                  key: keycloak
{{- end }}
