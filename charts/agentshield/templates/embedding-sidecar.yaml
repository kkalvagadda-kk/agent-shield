{{- /*
  embedding-sidecar.yaml
  POC-4 (Knowledge Base / RAG) embedding service. A small FastAPI app that turns
  text into 384-dim vectors (bge-small-en-v1.5, ONNX via fastembed). registry-api's
  ingest pipeline AND the internal knowledge/search endpoint call it, so query and
  document vectors always come from one model. Rendered as a PARENT-chart template
  (like minio-raw.yaml), not a sub-chart, so it reads .Values.embeddingSidecar.*
  and its Service is agentshield-embedding-sidecar:8000.
*/}}
{{- if (.Values.embeddingSidecar).enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-embedding-sidecar
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: embedding-sidecar
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: embedding-sidecar
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: embedding-sidecar
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with (.Values.global).imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: embedding-sidecar
          image: "{{ .Values.embeddingSidecar.image.repository }}:{{ .Values.embeddingSidecar.image.tag }}"
          imagePullPolicy: {{ .Values.embeddingSidecar.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          # Model loads in the background at startup; /ready is 503 until the ONNX
          # weights finish loading, so the pod only joins the Service once it can
          # actually embed. startupProbe gives the load a generous grace window.
          startupProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-embedding-sidecar
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: embedding-sidecar
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app.kubernetes.io/name: embedding-sidecar
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
