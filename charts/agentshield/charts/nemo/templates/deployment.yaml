apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nemo.fullname" . }}
  labels:
    app.kubernetes.io/name: nemo
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: nemo
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nemo
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      volumes:
        - name: rules
          configMap:
            name: {{ include "nemo.fullname" . }}-rules
      containers:
        - name: nemo
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: rules
              mountPath: /app/rules
              readOnly: true
          resources:
            requests:
              memory: "1Gi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          env:
            - name: RULES_DIR
              value: /app/rules
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nemo.fullname" . }}
  labels:
    app.kubernetes.io/name: nemo
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: nemo
    app.kubernetes.io/instance: {{ .Release.Name }}
