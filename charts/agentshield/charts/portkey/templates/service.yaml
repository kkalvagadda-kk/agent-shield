{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-portkey
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: portkey
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8787
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: portkey
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
