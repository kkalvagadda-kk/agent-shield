apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-deploy-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-deploy-controller
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}
    spec:
      serviceAccountName: {{ .Release.Name }}-deploy-controller
      {{- with ((.Values.global).imagePullSecrets | default list) }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: deploy-controller
          image: "{{ .Values.global.imageRegistry | default "registry.internal/agentshield" }}/deploy-controller:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: IfNotPresent
          env:
            - name: REGISTRY_API_URL
              valueFrom:
                secretKeyRef:
                  name: agentshield-secrets
                  key: registry-api-url
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agentshield-secrets
                  key: database-url
            - name: POLL_INTERVAL_SECONDS
              value: "5"
            - name: LOG_LEVEL
              value: "INFO"
            - name: DECLARATIVE_RUNNER_IMAGE
              value: "{{ .Values.global.imageRegistry | default "registry.internal/agentshield" }}/declarative-runner:{{ .Values.declarativeRunnerTag | default "latest" }}"
            # Namespace-qualified: the controller injects this host into agent
            # pods that run in OTHER namespaces (agents-*), where a bare service
            # name does not resolve. The langchain callback handler + SDK tracer
            # in those pods POST spans here, so it must be cross-namespace-reachable.
            - name: LANGFUSE_HOST
              value: "http://{{ .Release.Name }}-langfuse-web.{{ .Release.Namespace }}:3000"
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-api-keys
                  key: public-key
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-api-keys
                  key: secret-key
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
