replicaCount: 2

image:
  repository: registry.internal/agentshield/safety-orchestrator
  tag: "0.1.3"
  pullPolicy: IfNotPresent

existingSecret: postgres-passwords
piiTtlHours: 24

# Scanner URLs — default to sibling chart service names in the same namespace.
# Override if scanners are deployed in a different release or namespace.
llmguardUrl: ""
presidioAnalyzerUrl: ""
presidioAnonymizerUrl: ""
nemoUrl: ""

# Scanner enable flags — when false the orchestrator skips that scanner entirely
# (pass-through, no fail-closed). Set automatically by the umbrella chart based
# on whether the corresponding sub-chart is enabled.
llmguardEnabled: true
presidioEnabled: true
nemoEnabled: true
