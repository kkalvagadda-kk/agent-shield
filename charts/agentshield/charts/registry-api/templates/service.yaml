apiVersion: v1
kind: Service
metadata:
  name: {{ include "registry-api.fullname" . }}
  labels:
    {{- include "registry-api.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    {{- include "registry-api.selectorLabels" . | nindent 4 }}
