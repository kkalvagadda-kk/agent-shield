---
# Role: allow registry-api to manage Secrets + ConfigMaps and launch batch Jobs
# in the platform namespace only. Secrets = LLM provider creds; ConfigMaps = OPA
# policy bundles; Jobs = eval-runner batch evaluation jobs (Decision 20 / batch eval).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "registry-api.fullname" . }}-secret-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "registry-api.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["create", "get", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "registry-api.fullname" . }}-secret-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "registry-api.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "registry-api.fullname" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "registry-api.fullname" . }}-secret-manager
  apiGroup: rbac.authorization.k8s.io
