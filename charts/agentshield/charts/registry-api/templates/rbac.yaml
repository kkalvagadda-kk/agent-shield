---
# Role: allow registry-api to create/update/delete Secrets in the platform
# namespace only. Used to write LLM provider credential secrets at deploy time.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "registry-api.fullname" . }}-secret-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "registry-api.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "registry-api.fullname" . }}-secret-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "registry-api.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "registry-api.fullname" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "registry-api.fullname" . }}-secret-manager
  apiGroup: rbac.authorization.k8s.io
