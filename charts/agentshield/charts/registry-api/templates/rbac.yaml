---
# ClusterRole: allow registry-api to manage Secrets + ConfigMaps and launch batch
# Jobs across namespaces. Secrets = LLM provider creds (written to agents-* ns
# where pods run); ConfigMaps = OPA policy bundles; Jobs = eval-runner batch eval.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "registry-api.fullname" . }}-secret-manager
  labels:
    {{- include "registry-api.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["create", "get", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "registry-api.fullname" . }}-secret-manager
  labels:
    {{- include "registry-api.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "registry-api.fullname" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "registry-api.fullname" . }}-secret-manager
  apiGroup: rbac.authorization.k8s.io
