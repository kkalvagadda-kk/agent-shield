apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "registry-api.fullname" . }}
  labels:
    {{- include "registry-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount | default 2 }}
  selector:
    matchLabels:
      {{- include "registry-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "registry-api.labels" . | nindent 8 }}
    spec:
      {{- with ((.Values.global).imagePullSecrets | default list) }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              PG_HOST="{{ if and .Values.global .Values.global.postgresHost }}{{ .Values.global.postgresHost }}{{ else }}{{ .Release.Name }}-postgresql{{ end }}"
              echo "Waiting for Postgres at ${PG_HOST}:5432 ..."
              until nc -z "${PG_HOST}" 5432; do
                echo "  not ready, sleeping 5s..."
                sleep 5
              done
              echo "Postgres is ready"
        - name: wait-for-keycloak
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Keycloak (master realm) ..."
              until wget -qO- "http://{{ .Release.Name }}-keycloak/realms/master" > /dev/null 2>&1; do
                echo "  Keycloak not ready, sleeping 10s..."
                sleep 10
              done
              echo "Keycloak is up — agentshield realm will be created by the realm-init-job post-install hook"
        - name: alembic-migrate
          image: "{{ include "registry-api.imageRegistry" . }}/agentshield/registry-api:{{ .Values.image.tag | default "latest" }}"
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-passwords
                  key: registry-api-url
            - name: DIRECT_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-passwords
                  key: registry-api-direct-url
            - name: KEYCLOAK_URL
              value: "http://{{ .Release.Name }}-keycloak"
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-api-keys
                  key: public-key
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-api-keys
                  key: secret-key
            - name: LANGFUSE_HOST
              value: "http://{{ .Release.Name }}-langfuse-web:3000"
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: slack-credentials
                  key: webhook-url
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | default "INFO" | quote }}
      containers:
        - name: registry-api
          image: "{{ include "registry-api.imageRegistry" . }}/agentshield/registry-api:{{ .Values.image.tag | default "latest" }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-passwords
                  key: registry-api-url
            - name: DIRECT_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-passwords
                  key: registry-api-direct-url
            - name: KEYCLOAK_URL
              value: "http://{{ .Release.Name }}-keycloak"
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-api-keys
                  key: public-key
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-api-keys
                  key: secret-key
            - name: LANGFUSE_HOST
              value: "http://{{ .Release.Name }}-langfuse-web:3000"
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: slack-credentials
                  key: webhook-url
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | default "INFO" | quote }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | default "100m" }}
              memory: {{ .Values.resources.requests.memory | default "256Mi" }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | default "500m" }}
              memory: {{ .Values.resources.limits.memory | default "512Mi" }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
