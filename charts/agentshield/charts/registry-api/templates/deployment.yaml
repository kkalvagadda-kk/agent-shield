apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "registry-api.fullname" . }}
  labels:
    {{- include "registry-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount | default 2 }}
  selector:
    matchLabels:
      {{- include "registry-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "registry-api.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "registry-api.fullname" . }}
      {{- with ((.Values.global).imagePullSecrets | default list) }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              PG_HOST="{{ if and .Values.global .Values.global.postgresHost }}{{ .Values.global.postgresHost }}{{ else }}{{ .Release.Name }}-postgresql{{ end }}"
              echo "Waiting for Postgres at ${PG_HOST}:5432 ..."
              until nc -z "${PG_HOST}" 5432; do
                echo "  not ready, sleeping 5s..."
                sleep 5
              done
              echo "Postgres is ready"
        - name: wait-for-keycloak
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Keycloak (master realm) ..."
              until wget -qO- "http://{{ .Release.Name }}-keycloak/realms/master" > /dev/null 2>&1; do
                echo "  Keycloak not ready, sleeping 10s..."
                sleep 10
              done
              echo "Keycloak is up — agentshield realm will be created by the realm-init-job post-install hook"
        - name: alembic-migrate
          image: "{{ include "registry-api.imageRegistry" . }}/agentshield/registry-api:{{ .Values.image.tag | default "latest" }}"
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-passwords
                  key: registry-api-url
            - name: DIRECT_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-passwords
                  key: registry-api-direct-url
            - name: KEYCLOAK_URL
              value: "http://{{ .Release.Name }}-keycloak"
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-api-keys
                  key: public-key
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-api-keys
                  key: secret-key
            - name: LANGFUSE_HOST
              value: "http://{{ .Release.Name }}-langfuse-web:3000"
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: slack-credentials
                  key: webhook-url
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-password
                  key: admin-password
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | default "INFO" | quote }}
            - name: EVAL_RUNNER_IMAGE
              value: {{ .Values.evalRunnerImage | default "registry.internal/agentshield/eval-runner:0.1.1" | quote }}
            - name: AGENTSHIELD_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: agentshield-encryption
                  key: key
            - name: REDIS_URL
              value: {{ .Values.redisUrl | default (printf "redis://%s-redis-master:6379/0" .Release.Name) | quote }}
      containers:
        - name: registry-api
          image: "{{ include "registry-api.imageRegistry" . }}/agentshield/registry-api:{{ .Values.image.tag | default "latest" }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-passwords
                  key: registry-api-url
            - name: DIRECT_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-passwords
                  key: registry-api-direct-url
            - name: KEYCLOAK_URL
              value: "http://{{ .Release.Name }}-keycloak"
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-api-keys
                  key: public-key
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-api-keys
                  key: secret-key
            - name: LANGFUSE_HOST
              value: "http://{{ .Release.Name }}-langfuse-web:3000"
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: slack-credentials
                  key: webhook-url
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-password
                  key: admin-password
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | default "INFO" | quote }}
            - name: EVAL_RUNNER_IMAGE
              value: {{ .Values.evalRunnerImage | default "registry.internal/agentshield/eval-runner:0.1.1" | quote }}
            - name: AGENTSHIELD_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: agentshield-encryption
                  key: key
            - name: REDIS_URL
              value: {{ .Values.redisUrl | default (printf "redis://%s-redis-master:6379/0" .Release.Name) | quote }}
            - name: LANGFUSE_PUBLIC_URL
              value: {{ ((.Values.global).langfuseUrl) | default "" | quote }}
            - name: LANGFUSE_PROJECT_ID
              value: {{ .Values.langfuseProjectId | default "" | quote }}
            {{- /* Failure-alert SMTP (Phase 8). When smtp.host is empty the
                   vars are omitted and alerting.py stays in log-only mode. */}}
            {{- if .Values.smtp.host }}
            - name: SMTP_HOST
              value: {{ .Values.smtp.host | quote }}
            - name: SMTP_PORT
              value: {{ .Values.smtp.port | default 25 | quote }}
            - name: SMTP_FROM
              value: {{ .Values.smtp.from | default "alerts@agentshield.local" | quote }}
            {{- if .Values.smtp.existingSecret }}
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.smtp.existingSecret }}
                  key: {{ .Values.smtp.userKey | default "username" }}
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.smtp.existingSecret }}
                  key: {{ .Values.smtp.passwordKey | default "password" }}
            {{- end }}
            {{- end }}
            # Public base URL of the Event Gateway (Phase 9), used to build the
            # webhook URL returned by create/rotate-token. Prefer the public
            # gateway host (global.publicUrl) so the URL shown in Studio is a real,
            # externally reachable endpoint (the gateway routes /hooks/ → this
            # Service). Falls back to the in-cluster Service only when neither is set.
            - name: EVENT_GATEWAY_PUBLIC_URL
              value: {{ .Values.eventGatewayPublicUrl | default ((.Values.global).publicUrl) | default (printf "http://%s-event-gateway:8091" .Release.Name) | quote }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | default "100m" }}
              memory: {{ .Values.resources.requests.memory | default "256Mi" }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | default "500m" }}
              memory: {{ .Values.resources.limits.memory | default "512Mi" }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
