# Default values for registry-api sub-chart.
# These are overridden by the parent agentshield umbrella chart values
# under the `registry-api:` key (see charts/agentshield/values.yaml).

replicaCount: 2

image:
  tag: "0.2.0"
  pullPolicy: IfNotPresent

logLevel: "INFO"

# Failure-alert SMTP transport (Phase 8). Leave host empty to run alerting in
# log-only mode (no email sent). Set host/port/from to enable delivery; provide
# existingSecret (with userKey/passwordKey) for authenticated relays.
smtp:
  host: ""
  port: 25
  from: "alerts@agentshield.local"
  existingSecret: ""
  userKey: "username"
  passwordKey: "password"

langfuseProjectId: ""

service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
