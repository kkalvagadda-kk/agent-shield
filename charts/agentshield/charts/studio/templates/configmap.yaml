apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "studio.fullname" . }}-nginx
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
data:
  nginx.conf: |
    server {
      listen 80;
      root /usr/share/nginx/html;
      index index.html;

      # Proxy API calls to the Registry API
      location /api/ {
        proxy_pass http://{{ .Release.Name }}-registry-api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        # Rewrite backend redirect URLs so the browser never sees internal hostnames
        proxy_redirect http://{{ .Release.Name }}-registry-api:8000/ /;
      }

      # SPA fallback — all other routes serve index.html
      location / {
        try_files $uri $uri/ /index.html;
      }
    }
