apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "studio.fullname" . }}-nginx
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
data:
  nginx.conf: |
    server {
      listen 80;
      root /usr/share/nginx/html;
      index index.html;

      # Keycloak config for the SPA — fetched at runtime so the image is
      # environment-agnostic. Empty keycloakUrl means "same origin" (the
      # browser uses window.location.origin, which nginx proxies to KC).
      location = /config.json {
        add_header Content-Type "application/json";
        add_header Cache-Control "no-store";
        return 200 '{"keycloakUrl":"","keycloakRealm":"agentshield","keycloakClientId":"agentshield-studio"}';
      }

      # Proxy Keycloak OIDC endpoints through Studio so the browser only
      # needs one port (no separate KC port-forward required).
      #
      # Two rewrites are required to keep the browser on localhost:5173:
      #
      # 1. proxy_redirect — rewrites Location headers in 3xx responses so
      #    Keycloak's internal hostname never reaches the browser.
      #
      # 2. sub_filter — rewrites the internal hostname embedded in KC's
      #    login page HTML (form action="http://agentshield-keycloak/...")
      #    to a root-relative path the browser resolves against localhost.
      #    Accept-Encoding is cleared so KC sends uncompressed HTML.
      location ~ ^/(realms|resources|js)(/.*)?$ {
        proxy_pass http://{{ .Release.Name }}-keycloak;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_redirect http://{{ .Release.Name }}-keycloak/ /;
        proxy_set_header Accept-Encoding "";
        sub_filter 'http://{{ .Release.Name }}-keycloak' '';
        sub_filter_once off;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
      }

      # SSE stream endpoints — disable buffering so events reach the
      # browser in real-time (nginx buffers by default, which causes
      # approval_requested events to sit in the buffer indefinitely).
      # Covers: playground streams, production chat streams, resume streams.
      location ~ ^/api/v1/(playground/runs|agents)/.*/(stream|resume-stream)$ {
        proxy_pass http://{{ .Release.Name }}-registry-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
        proxy_redirect http://{{ .Release.Name }}-registry-api:8000/ /;
      }

      # Proxy API calls to the Registry API
      location /api/ {
        proxy_pass http://{{ .Release.Name }}-registry-api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        proxy_redirect http://{{ .Release.Name }}-registry-api:8000/ /;
      }

      # Hashed assets — cache forever (filenames change on rebuild)
      location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
      }

      # SPA fallback — serve index.html but never cache it so deploys
      # are reflected immediately without users clearing browser cache
      location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
      }
    }
