apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "presidio.fullname" . }}
  labels:
    app.kubernetes.io/name: presidio
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: presidio
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: presidio
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: presidio-analyzer
          image: "{{ .Values.analyzer.image.repository }}:{{ .Values.analyzer.image.tag }}"
          imagePullPolicy: {{ .Values.analyzer.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 3000
              name: analyzer
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30

        - name: presidio-anonymizer
          image: "{{ .Values.anonymizer.image.repository }}:{{ .Values.anonymizer.image.tag }}"
          imagePullPolicy: {{ .Values.anonymizer.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 3001
              name: anonymizer
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
