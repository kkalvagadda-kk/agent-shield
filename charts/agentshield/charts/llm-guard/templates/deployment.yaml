apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llm-guard.fullname" . }}
  labels:
    app.kubernetes.io/name: llm-guard
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount | default 2 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: llm-guard
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-guard
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: llm-guard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          env:
            - name: APP_PORT
              value: "8000"
            - name: ENABLE_BEST_EFFORT
              value: "true"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "llm-guard.fullname" . }}
  labels:
    app.kubernetes.io/name: llm-guard
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: llm-guard
    app.kubernetes.io/instance: {{ .Release.Name }}
