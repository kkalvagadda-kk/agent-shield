{{- if .Values.enabled }}
# Exposes Gateway HTTPS on port 8443 inside the cluster.
# Needed because KC_HOSTNAME includes :8443 (the port-forward port), and services
# inside the cluster (Langfuse SSO) must reach the OIDC endpoints at that port.
# The auto-generated Gateway Service only exposes 80+443.
apiVersion: v1
kind: Service
metadata:
  name: gateway-port-8443
  namespace: envoy-gateway-system
spec:
  type: ClusterIP
  ports:
    - name: https-8443
      port: 8443
      targetPort: 10443
      protocol: TCP
  selector:
    app.kubernetes.io/component: proxy
    app.kubernetes.io/managed-by: envoy-gateway
    app.kubernetes.io/name: envoy
    gateway.envoyproxy.io/owning-gateway-name: {{ .Values.gateway.name }}
    gateway.envoyproxy.io/owning-gateway-namespace: {{ .Release.Namespace }}
{{- end }}
