{{- if .Values.ingress.enabled }}
{{- /*
  Public webhook ingress — exposes ONLY /hooks/* to the internet, routed to the
  event-gateway Service. This is the primary control for threat-model T-8:
  /api/v1/internal/* is NEVER given a public path here, so the internal
  run-start endpoint is not reachable from outside the cluster.
*/}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-event-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Release.Name }}-event-gateway-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /hooks
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-event-gateway
                port:
                  number: {{ .Values.service.port | default 8091 }}
{{- end }}
