apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-event-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-event-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}
spec:
  # 2 replicas: the gateway is stateless (rate-limit + replay state live in Redis).
  replicas: {{ .Values.replicaCount | default 2 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}
    spec:
      serviceAccountName: {{ .Release.Name }}-event-gateway
      {{- with ((.Values.global).imagePullSecrets | default list) }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: event-gateway
          image: "{{ .Values.global.imageRegistry | default "registry.internal/agentshield" }}/event-gateway:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: 8091
          env:
            - name: REGISTRY_API_URL
              valueFrom:
                secretKeyRef:
                  name: agentshield-secrets
                  key: registry-api-url
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agentshield-secrets
                  key: database-url
            # WS-4: decrypts webhook_clients.secret_encrypted so a client_signed
            # signature can be RECOMPUTED and verified. The SAME Secret the
            # registry-api uses to encrypt it (charts/registry-api/templates/
            # deployment.yaml). Without this env var every signed webhook fails
            # closed (401) — the verify hop would verify nothing.
            - name: AGENTSHIELD_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: agentshield-encryption
                  key: key
            # Redis (rate limit + replay nonce). $(REDIS_PASSWORD) is substituted
            # by kubelet because it is declared before REDIS_URL.
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-password
                  key: redis-password
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@{{ .Release.Name }}-redis-master:6379/0"
            - name: RATE_LIMIT_WINDOW_SECONDS
              value: {{ .Values.rateLimit.windowSeconds | default "60" | quote }}
            - name: RATE_LIMIT_MAX_PER_AGENT
              value: {{ .Values.rateLimit.maxPerAgent | default "100" | quote }}
            - name: RATE_LIMIT_MAX_PER_IP
              value: {{ .Values.rateLimit.maxPerIp | default "60" | quote }}
            - name: REPLAY_MAX_SKEW_SECONDS
              value: {{ .Values.replayMaxSkewSeconds | default "300" | quote }}
            - name: MAX_BODY_BYTES
              value: {{ .Values.maxBodyBytes | default "262144" | quote }}
            - name: TRUSTED_PROXY_HOPS
              value: {{ .Values.trustedProxyHops | default "1" | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | default "INFO" | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | default "50m" }}
              memory: {{ .Values.resources.requests.memory | default "64Mi" }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | default "250m" }}
              memory: {{ .Values.resources.limits.memory | default "192Mi" }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-event-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.service.port | default 8091 }}
      targetPort: 8091
      protocol: TCP
