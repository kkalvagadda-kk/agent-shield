# ============================================================================
# AgentShield Umbrella Chart — Top-Level Values
# ============================================================================
# All passwords / API keys are read from pre-existing Kubernetes Secrets.
# Never store credential values in this file.
# Create secrets before installing:
#
#   kubectl create secret generic postgres-passwords \
#     -n agentshield-platform \
#     --from-literal=keycloak=<pw> \
#     --from-literal=agentshield=<pw> \
#     --from-literal=langfuse=<pw> \
#     --from-literal=langgraph=<pw> \
#     --from-literal=appsmith=<pw>
#
#   kubectl create secret generic redis-password \
#     -n agentshield-platform --from-literal=redis-password=<pw>
#
#   kubectl create secret generic minio-credentials \
#     -n agentshield-platform \
#     --from-literal=root-user=<access-key> \
#     --from-literal=root-password=<secret-key>
#
#   kubectl create secret generic keycloak-admin-password \
#     -n agentshield-platform --from-literal=admin-password=<pw>
#
#   kubectl create secret generic langfuse-api-keys \
#     -n agentshield-platform \
#     --from-literal=public-key=<pk> \
#     --from-literal=secret-key=<sk>
# ============================================================================

# ── Global overrides ─────────────────────────────────────────────────────────
global:
  # Registry prefix for all platform images (override with your internal registry)
  # Example: harbor.internal/agentshield
  imageRegistry: ""

  # StorageClass for all PersistentVolumeClaims (leave empty to use cluster default)
  storageClass: ""

  # Hostname (ClusterIP service name) of PgBouncer — all services connect here
  postgresHost: "agentshield-postgresql"

  # Internal hostname of Langfuse web service for SDK tracing
  langfuseHost: "http://agentshield-langfuse-web:3000"

  # Browser-facing base URL (single source of truth for all public endpoints).
  publicUrl: "https://agentshield.127.0.0.1.nip.io:8443"

  # Browser-facing Langfuse URL (subdomain — no path prefix needed).
  # Trace links in Studio point here.
  langfuseUrl: "https://langfuse.127.0.0.1.nip.io:8443"

  # Namespace all platform components run in (ArgoCD / helmfile override)
  namespace: agentshield-platform

  # imagePullSecrets: names of pre-created K8s Secrets with registry credentials.
  # Leave empty for local Docker Desktop (no auth needed for local images).
  # Example (Harbor/ECR):
  #   imagePullSecrets:
  #     - name: harbor-registry-creds
  imagePullSecrets: []

# ── Sub-chart enable flags ────────────────────────────────────────────────────
# NOTE: these short toggles are intentionally kept in sync with the detailed
# per-component blocks further down. Because YAML resolves duplicate top-level
# keys as last-wins, the DETAILED block for each component (below) is the
# authoritative one — the flags here are set to the same values for clarity and
# safety. Default composition = the known-good local/single-node platform:
# heavy governance sidecars (safety-orchestrator, llm-guard, presidio, nemo,
# portkey) and OPA/appsmith are OFF by default; keycloak/minio/pgbouncer/
# clickhouse Bitnami sub-charts are OFF because raw templates / langfuse provide
# those components. Enable any of them per-environment as needed.
postgresql:
  enabled: true

pgbouncer:
  enabled: false

redis:
  enabled: true

minio:
  enabled: false

keycloak:
  enabled: false

langfuse:
  enabled: true

clickhouse:
  enabled: false

appsmith:
  enabled: false

registry-api:
  enabled: true

deploy-controller:
  enabled: true

python-executor:
  enabled: true

scheduler:
  enabled: true

# embedding-sidecar: POC-4 Knowledge Base / RAG embedding service. A small FastAPI
# app that turns text into 384-dim vectors (bge-small-en-v1.5, ONNX via fastembed).
# registry-api's ingest pipeline + internal knowledge/search call it so query and
# document vectors come from one model. Rendered by the parent-chart template
# templates/embedding-sidecar.yaml (NOT a sub-chart), so its image lives here.
embeddingSidecar:
  enabled: true
  image:
    repository: registry.internal/agentshield/embedding-sidecar
    tag: "0.1.0"
    pullPolicy: IfNotPresent

# event-gateway: Phase 9 public webhook ingress. Image tag + tunables come from
# the sub-chart defaults (charts/event-gateway/values.yaml); Ingress + L4
# NetworkPolicy are OFF by default there (local Docker Desktop has no ingress
# controller / non-enforcing CNI — tests hit the Service in-cluster).
event-gateway:
  enabled: true

# Envoy Gateway ingress — path-based routing to all services via Gateway API.
# Requires Envoy Gateway controller pre-installed: bash scripts/setup-envoy-gateway.sh
# TLS with self-signed cert: HTTPS = secure context → Web Crypto API works for Keycloak PKCE.
# Browser shows cert warning once (click through), then all works.
#
# publicUrl is now defined under global.publicUrl (single source of truth).
# All services derive their public endpoints from it:
#   Keycloak: KC_HOSTNAME = global.publicUrl
#   Langfuse: NEXTAUTH_URL = global.publicUrl + /langfuse  (set manually below)
#   Registry-API: LANGFUSE_PUBLIC_URL = global.publicUrl + /langfuse  (computed in template)

envoy-gateway:
  enabled: true
  gateway:
    name: agentshield-gateway
    hostname: "agentshield.127.0.0.1.nip.io"
    langfuseHostname: "langfuse.127.0.0.1.nip.io"
    port: 80
    tls:
      enabled: true
      secretName: gateway-tls
  gatewayClass:
    name: agentshield
    controllerName: gateway.envoyproxy.io/gatewayclass-controller

# Postgres PV reclaim=Retain guard hook. OFF by default: it needs a kubectl image
# (bitnami/kubectl) that may be unpullable offline, and a failed Helm hook fails
# the release. Enable only where that image is available; otherwise patch the PV
# reclaim policy manually once (see docs/runbooks/postgres-backup.md).
pvRetainHook:
  enabled: true

safety-orchestrator:
  enabled: false

llm-guard:
  enabled: false

presidio:
  enabled: false

nemo:
  enabled: false

portkey:
  enabled: false

opa:
  enabled: false

studio:
  enabled: true

# ── PostgreSQL (Bitnami) ─────────────────────────────────────────────────────
postgresql:
  enabled: true

  auth:
    # Passwords are sourced from the pre-created K8s Secret "postgres-passwords".
    # The Bitnami chart supports existingSecret for the postgres superuser.
    existingSecret: postgres-passwords
    secretKeys:
      adminPasswordKey: keycloak   # reused as postgres superuser during init
    database: postgres
    username: postgres

  primary:
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

    persistence:
      enabled: true
      size: 5Gi
      # storageClass inherits global.storageClass if set

    replication:
      synchronousCommit: "off"
      numSynchronousReplicas: 0

    initdb:
      # Post-boot SQL: create all platform databases and users.
      # Passwords are injected at runtime from the postgres-passwords Secret
      # via the DATABASE_PASSWORDS_ env var pattern (see scriptsConfigMap below).
      scripts:
        01_create_databases.sql: |
          CREATE DATABASE keycloak;
          CREATE DATABASE agentshield;
          CREATE DATABASE langfuse;
          CREATE DATABASE langgraph;
          CREATE DATABASE appsmith;
        02_create_users.sql: |
          -- Application roles. Passwords are set immediately after by 03_set_passwords.sh.
          CREATE ROLE keycloak_user WITH LOGIN;
          CREATE ROLE agentshield_user WITH LOGIN;
          CREATE ROLE langfuse_user WITH LOGIN;
          CREATE ROLE langgraph_user WITH LOGIN;
          CREATE ROLE appsmith_user WITH LOGIN;

          GRANT ALL PRIVILEGES ON DATABASE keycloak TO keycloak_user;
          GRANT ALL PRIVILEGES ON DATABASE agentshield TO agentshield_user;
          GRANT ALL PRIVILEGES ON DATABASE langfuse TO langfuse_user;
          GRANT ALL PRIVILEGES ON DATABASE langgraph TO langgraph_user;
          GRANT ALL PRIVILEGES ON DATABASE appsmith TO appsmith_user;
          -- PostgreSQL 15+ removed CREATE from PUBLIC on schema public; grant it explicitly.
          \c keycloak
          GRANT ALL ON SCHEMA public TO keycloak_user;
          \c agentshield
          GRANT ALL ON SCHEMA public TO agentshield_user;
          \c langfuse
          GRANT ALL ON SCHEMA public TO langfuse_user;
          \c langgraph
          GRANT ALL ON SCHEMA public TO langgraph_user;
          \c appsmith
          GRANT ALL ON SCHEMA public TO appsmith_user;
        03_set_passwords.sh: |
          #!/bin/bash
          # Set each application role's password to the postgres superuser password
          # so PgBouncer can authenticate them. Rotate to per-role secrets in Phase 3.
          set -e
          export PGPASSWORD="${POSTGRESQL_PASSWORD}"
          PW="${POSTGRESQL_PASSWORD}"
          psql -v ON_ERROR_STOP=1 -U postgres -c "ALTER ROLE keycloak_user WITH PASSWORD '${PW}'"
          psql -v ON_ERROR_STOP=1 -U postgres -c "ALTER ROLE agentshield_user WITH PASSWORD '${PW}'"
          psql -v ON_ERROR_STOP=1 -U postgres -c "ALTER ROLE langfuse_user WITH PASSWORD '${PW}'"
          psql -v ON_ERROR_STOP=1 -U postgres -c "ALTER ROLE langgraph_user WITH PASSWORD '${PW}'"
          psql -v ON_ERROR_STOP=1 -U postgres -c "ALTER ROLE appsmith_user WITH PASSWORD '${PW}'"

  readReplicas:
    replicaCount: 0
    persistence:
      enabled: true
      size: 20Gi

  metrics:
    enabled: true

# ── PgBouncer (Bitnami) ───────────────────────────────────────────────────────
pgbouncer:
  enabled: false

  # PgBouncer connects to the Postgres primary service.
  postgresql:
    host: agentshield-postgresql
    port: 5432
    database: postgres
    username: postgres
    existingSecret: postgres-passwords
    existingSecretPasswordKey: keycloak  # superuser pw; override per-db in pgbouncer.ini

  pgbouncer:
    poolMode: transaction
    maxClientConn: 200
    defaultPoolSize: 25
    reservePoolSize: 5
    logConnections: false
    logDisconnections: false
    authType: scram-sha-256

  service:
    port: 5432

# ── Redis (Bitnami) ───────────────────────────────────────────────────────────
redis:
  enabled: true

  auth:
    enabled: true
    existingSecret: redis-password
    existingSecretPasswordKey: redis-password

  architecture: standalone

  master:
    persistence:
      enabled: true
      size: 1Gi
    # AOF persistence for durability
    extraFlags:
      - "--appendonly yes"
      - "--appendfsync everysec"

  metrics:
    enabled: true

# ── MinIO (Bitnami) ───────────────────────────────────────────────────────────
minio:
  enabled: false

  auth:
    existingSecret: minio-credentials
    existingSecretAccessKeyIDKey: root-user
    existingSecretSecretAccessKeyKey: root-password

  defaultBuckets: "postgres-backups,clickhouse-backups,langfuse-media,eval-artifacts"

  persistence:
    enabled: true
    size: 50Gi

  mode: standalone

  service:
    port: 9000

  consoleService:
    port: 9001

# ── Keycloak (Bitnami) ────────────────────────────────────────────────────────
keycloak:
  enabled: false

  auth:
    adminUser: admin
    existingSecret: keycloak-admin-password
    existingSecretKey: admin-password

  # Realm is configured post-install via kcadm.sh CLI (see plan.md Week 1, Task 8).
  # Initial realm: agentshield
  # Initial clients: registry-api, envoy-gateway
  # Initial users: platform-admin, agent-reviewer

  extraEnvVars:
    - name: KC_DB
      value: postgres
    - name: KC_DB_URL
      value: jdbc:postgresql://agentshield-pgbouncer:5432/keycloak
    - name: KC_DB_USERNAME
      value: keycloak_user
    - name: KC_DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: postgres-passwords
          key: keycloak
    - name: KC_HOSTNAME_STRICT
      value: "false"
    - name: KC_HTTP_ENABLED
      value: "true"
    - name: KC_PROXY_HEADERS
      value: "xforwarded"

  startupProbe:
    initialDelaySeconds: 120
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30

  livenessProbe:
    initialDelaySeconds: 120
    periodSeconds: 20

  readinessProbe:
    initialDelaySeconds: 120
    periodSeconds: 10

  service:
    type: ClusterIP
    ports:
      http: 80

  postgresql:
    enabled: false  # Using shared Postgres via PgBouncer

  externalDatabase:
    host: agentshield-pgbouncer
    port: 5432
    database: keycloak
    user: keycloak_user
    existingSecret: postgres-passwords
    existingSecretPasswordKey: keycloak

# ── Langfuse ──────────────────────────────────────────────────────────────────
langfuse:
  enabled: true

  # Langfuse application config (maps to langfuse.* in the subchart)
  langfuse:
    salt:
      secretKeyRef:
        name: langfuse-api-keys
        key: salt
    encryptionKey:
      secretKeyRef:
        name: langfuse-api-keys
        key: encryption-key
    nextauth:
      # Must equal global.langfuseUrl (Langfuse subchart is packaged .tgz, can't template)
      url: "https://langfuse.127.0.0.1.nip.io:8443"
      secret:
        secretKeyRef:
          name: langfuse-api-keys
          key: nextauth-secret
    features:
      telemetryEnabled: false   # self-hosted, no external reporting
    # Auto-bootstrap org/project/user on first boot so platform services can
    # trace immediately without manual Langfuse UI setup.
    additionalEnv:
      # LANGFUSE_INIT_ORG_ID is required in v3 to activate the init variables.
      - name: LANGFUSE_INIT_ORG_ID
        value: "00000000-0000-0000-0000-agentshield01"
      - name: LANGFUSE_INIT_ORG_NAME
        value: "AgentShield"
      - name: LANGFUSE_INIT_PROJECT_ID
        value: "00000000-0000-0000-0001-agentshield01"
      - name: LANGFUSE_INIT_PROJECT_NAME
        value: "AgentShield Platform"
      - name: LANGFUSE_INIT_PROJECT_PUBLIC_KEY
        valueFrom:
          secretKeyRef:
            name: langfuse-api-keys
            key: public-key
      - name: LANGFUSE_INIT_PROJECT_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: langfuse-api-keys
            key: secret-key
      - name: LANGFUSE_INIT_USER_EMAIL
        value: "admin@agentshield.local"
      - name: LANGFUSE_INIT_USER_PASSWORD
        value: "AdminPass2024"
      - name: LANGFUSE_INIT_USER_NAME
        value: "AgentShield Admin"
      # Keycloak SSO — single login covers Studio + Langfuse
      - name: AUTH_KEYCLOAK_CLIENT_ID
        value: "langfuse"
      - name: AUTH_KEYCLOAK_CLIENT_SECRET
        value: "langfuse-client-secret-2024"
      - name: AUTH_KEYCLOAK_ISSUER
        value: "https://agentshield.127.0.0.1.nip.io:8443/realms/agentshield"
      - name: AUTH_KEYCLOAK_ALLOW_ACCOUNT_LINKING
        value: "true"
      - name: AUTH_DISABLE_USERNAME_PASSWORD
        value: "true"
      - name: NODE_TLS_REJECT_UNAUTHORIZED
        value: "0"
    # hostAliases: pod must reach Keycloak OIDC at :8443 (nip.io → 127.0.0.1 = loopback inside K8s).
    # Points to gateway-port-8443 Service in envoy-gateway-system (maps 8443→Gateway HTTPS).
    web:
      hostAliases:
        - ip: "10.96.203.50"
          hostnames:
            - "agentshield.127.0.0.1.nip.io"

  # PostgreSQL — use existing platform PostgreSQL directly (no PgBouncer for CPE2E)
  postgresql:
    deploy: false
    host: agentshield-postgresql
    port: 5432
    auth:
      username: langfuse_user
      database: langfuse
      existingSecret: postgres-passwords
      secretKeys:
        userPasswordKey: langfuse
        adminPasswordKey: langfuse

  # Redis — use existing platform Redis (Valkey)
  redis:
    deploy: false
    host: agentshield-redis-master
    port: 6379
    auth:
      existingSecret: redis-password
      existingSecretPasswordKey: redis-password

  # ClickHouse — minimal single-shard deployment. Langfuse v3 requires ClickHouse for
  # the event ingestion pipeline. Resources overridden for CPE2E/local cluster.
  # IMPORTANT: Bitnami sub-chart names the service agentshield-clickhouse (no "langfuse" prefix).
  # Apply infra/langfuse/clickhouse-alias-svc.yaml so that the Langfuse-derived hostname
  # agentshield-langfuse-clickhouse resolves to the real service.
  # For production, remove resourcesPreset/resources overrides and increase persistence.
  clickhouse:
    deploy: true
    auth:
      username: "langfuse"
      password: "ChLangfuse2024"
    shards: 1
    replicaCount: 1
    resourcesPreset: "none"
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "2"
        memory: "2Gi"
    persistence:
      enabled: true
      size: 5Gi
    zookeeper:
      enabled: false
    # Disable ClickHouse's own internal query-profiling system tables (trace_log,
    # text_log, metric_log, asynchronous_metric_log). Nothing in AgentShield or
    # Langfuse reads them — confirmed by repo-wide grep — and they were the actual
    # driver of repeated MEMORY_LIMIT_EXCEEDED OOMs during merges (trace_log alone
    # grew to 865MiB/58.9M rows while Langfuse's own traces table stayed ~50KB).
    # See docs/bugs/langfuse-clickhouse-oom.md.
    extraOverrides: |
      <yandex>
        <trace_log remove="1"/>
        <text_log remove="1"/>
        <metric_log remove="1"/>
        <asynchronous_metric_log remove="1"/>
      </yandex>

  # S3/MinIO — lightweight media/export storage companion for Langfuse
  s3:
    deploy: true
    bucket: "langfuse-media"
    region: "auto"
    forcePathStyle: true
    accessKeyId:
      value: "langfuse-admin"
    secretAccessKey:
      value: "LangfuseMinio2024"
    auth:
      rootUser: "langfuse-admin"
      rootPassword: "LangfuseMinio2024"
    resourcesPreset: "none"
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    persistence:
      enabled: true
      size: 5Gi

  web:
    replicaCount: 1
    service:
      type: ClusterIP
      port: 3000

  worker:
    replicaCount: 1

# ── ClickHouse (top-level Bitnami chart) — disabled; Langfuse uses its own sub-chart ──
clickhouse:
  enabled: false

# ── Appsmith (Community Edition) ──────────────────────────────────────────────
appsmith:
  enabled: false

  persistence:
    enabled: true
    size: 10Gi

  service:
    type: ClusterIP
    port: 80

  ingress:
    enabled: false  # Enable and configure externally if needed

# ── Registry API (local sub-chart) ───────────────────────────────────────────
registry-api:
  enabled: true

  replicaCount: 2

  image:
    repository: registry.internal/agentshield/registry-api
    # E-2: migration 0063 (tools.side_effecting + playground_runs.eval_mode);
    # eval_mode threaded run-create → durable dispatch body → runner
    # Context Storage POC-0/1: migration 0064 (agent_memory scope/workflow_run_id/
    # message_kind); ConversationStore; session_id threading; shared workflow thread.
    # 0.2.187: fix GET /memory read regression — POC-0 routed the transcript API
    # through the lean LLM-context path (load_context), which dropped message_index
    # and forced deployment_id IS NULL (excluded deployment-tagged rows). Restore
    # row metadata through the Turn port + reconcile the deployment filter.
    # 0.2.189: SSE token/agent_start frames carry author (POC-2 attribution)
    # 0.2.192: POC-5 backend — list_conversations + /me/conversations + /agents/{name}/memory/conversations
    # 0.2.193: POC-5 fix — list_conversations min(deployment_id) → array_agg[1] (no min(uuid) in Postgres)
    # 0.2.194: Ollama provider — LLM_PROVIDER_SPECS registry + base_url credential + drop provider CHECK (migration 0066)
    # 0.2.195: POC-4 Knowledge Base / RAG — migration 0067 + ports + ingest + knowledge/internal routers + knowledge_search tool
    # 0.2.198: Credentials — AuthConfigResponse.has_credentials (empty-shell detection; 403 root cause)
    # 0.2.199: workflows — correct reactive-workflow approval warning (STOPS EARLY, not FAIL)
    # 0.2.200: reactive-workflow HITL — member approval inline (playground), not production console
    # 0.2.201: restore inline HITL for reactive workflows — park+resume (revert exec-models-v2 fail-closed)
    # 0.2.202: reactive/eval HITL resume hits the agent's ACTUAL env pod (was -production DNS-fail)
    # 0.2.203: workflow inline HITL — playground decide resumes+advances the workflow member
    # 0.2.204: multi-KB per agent (bind upsert + reverse-lookup + search fan-out); updateAgent enforces
    #   knowledge_search ∈ agent_tools ⟺ ≥1 KB binding
    # 0.2.205: GET /workflows/{id}/conversations (workflow transcript via parent runs)
    # 0.2.206: HITL multi-approval fix — reactive member resume re-parks on a still-pending approval
    # 0.2.207: workflow ledger G2 backend — GET /workflows/{id}/memory + memory.list_workflow_memory
    tag: "0.2.207"
    pullPolicy: IfNotPresent

  evalRunnerImage: "registry.internal/agentshield/eval-runner:0.1.10"
  langfuseProjectId: "00000000-0000-0000-0001-agentshield01"

  service:
    type: ClusterIP
    port: 8000

  # Failure-alert SMTP (Phase 8). host="" ⇒ alerting runs log-only (no email).
  # Set host/port/from to deliver; existingSecret+userKey/passwordKey for auth.
  smtp:
    host: ""
    port: 25
    from: "alerts@agentshield.local"
    existingSecret: ""
    userKey: "username"
    passwordKey: "password"

  env:
    DATABASE_URL:
      valueFrom:
        secretKeyRef:
          name: postgres-passwords
          key: agentshield  # Registry API reads DB password from here; full URL built in config.py
    REDIS_URL: "redis://:$(REDIS_PASSWORD)@agentshield-redis-master:6379/0"
    LANGFUSE_HOST: "http://agentshield-langfuse-web:3000"
    # LANGFUSE_PUBLIC_URL is now wired via registry-api.langfusePublicUrl (see above)
    EVAL_RUNNER_IMAGE: "registry.internal/agentshield/eval-runner:0.1.10"
    KEYCLOAK_URL: "http://agentshield-keycloak/realms/agentshield"

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 15
    periodSeconds: 20

  readinessProbe:
    httpGet:
      path: /ready
      port: 8000
    initialDelaySeconds: 20
    periodSeconds: 10

# ── Deploy Controller (local sub-chart) ───────────────────────────────────────
deploy-controller:
  enabled: true

  replicaCount: 1

  image:
    repository: registry.internal/agentshield/deploy-controller
    # Context Storage POC-0 (T005): injects DIRECT_DATABASE_URL +
    # AGENTSHIELD_DEPLOYMENT_ID into agent pods.
    # 0.1.38: sets imagePullSecrets on agent pods (private-registry pulls).
    # 0.1.39: per-provider LLM env map (base_url→OLLAMA_BASE_URL for ollama).
    tag: "0.1.39"
    pullPolicy: IfNotPresent

  # NOTE: bump this when the declarative-runner image (or the SDK it bakes in)
  # changes — existing agent pods keep their old tag until re-deployed.
  # Image tag used for the declarative-runner pods the controller provisions
  # for declarative/durable agents. Must be a real, built tag (not "latest").
  # E-2: REQUIRED rebuild — the record/mock delivery seam lives in
  # sdk/agentshield_sdk/ (graph_builder + durable), pip-bundled into this image.
  # Context Storage POC-0/1: fail-loud AsyncPostgresSaver + runner memory
  # load/save + shared workflow transcript are all baked into this image.
  # 0.1.57: SDK ChatOllama (langchain-ollama) — LLM_PROVIDER=ollama + OLLAMA_BASE_URL.
  declarativeRunnerTag: "0.1.58"

  env:
    REGISTRY_API_URL: "http://agentshield-registry-api:8000"
    POLL_INTERVAL_SECONDS: "5"

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  # RBAC — ClusterRole allows create/update/delete in agents-* namespaces
  rbac:
    create: true

# ── Safety Orchestrator (local sub-chart) ─────────────────────────────────────
safety-orchestrator:
  enabled: false

  # Scanner enable flags — set to false to make the orchestrator skip that
  # scanner entirely (pass-through, no fail-closed). Should match the
  # corresponding sub-chart's enabled flag so the orchestrator doesn't
  # try to call a service that isn't running.
  llmguardEnabled: true
  presidioEnabled: true
  nemoEnabled: true

  replicaCount: 2

  image:
    repository: registry.internal/agentshield/safety-orchestrator
    tag: "0.1.0"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080

  env:
    LLM_GUARD_URL: "http://agentshield-llm-guard:8000"
    PRESIDIO_ANALYZER_URL: "http://agentshield-presidio:3000"
    PRESIDIO_ANONYMIZER_URL: "http://agentshield-presidio:3001"
    NEMO_URL: "http://agentshield-nemo:8000"
    SCANNER_TIMEOUT_SECONDS: "5"
    LANGFUSE_HOST: "http://agentshield-langfuse-web:3000"
    POSTGRES_HOST: "agentshield-pgbouncer"
    POSTGRES_DB: "agentshield"

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  livenessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 15

  readinessProbe:
    httpGet:
      path: /ready
      port: 8080
    initialDelaySeconds: 20

# ── LLM Guard (local sub-chart) ───────────────────────────────────────────────
llm-guard:
  enabled: false

  replicaCount: 2

  image:
    repository: ghcr.io/protectai/llm-guard
    tag: "0.5.0"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8000

  env:
    INPUT_SCANNERS: "PromptInjection,Secrets,Toxicity"
    OUTPUT_SCANNERS: "Sensitive,Toxicity,NoRefusal"

  resources:
    # DeBERTa model requires ~3GB RAM; 4Gi limit gives headroom
    requests:
      cpu: 1000m
      memory: 4Gi
    limits:
      cpu: 2000m
      memory: 4Gi

# ── Presidio (local sub-chart) ────────────────────────────────────────────────
presidio:
  enabled: false

  replicaCount: 1

  analyzer:
    image:
      repository: mcr.microsoft.com/presidio-analyzer
      tag: latest
      pullPolicy: IfNotPresent
    port: 3000
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 1000m
        memory: 2Gi

  anonymizer:
    image:
      repository: mcr.microsoft.com/presidio-anonymizer
      tag: latest
      pullPolicy: IfNotPresent
    port: 3001
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

  service:
    type: ClusterIP

# ── NeMo Guardrails (local sub-chart) ─────────────────────────────────────────
nemo:
  enabled: false

  replicaCount: 1

  image:
    repository: nvcr.io/nvidia/nemo
    tag: "24.09"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8000

  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 1000m
      memory: 3Gi

  # YARA injection rules mounted from ConfigMap
  rulesConfigMap: nemo-yara-rules

# ── Portkey OSS (local sub-chart) ─────────────────────────────────────────────
portkey:
  enabled: false

  replicaCount: 1

  image:
    repository: portkeyai/gateway
    tag: latest
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8787

  env:
    REDIS_URL: "redis://:$(REDIS_PASSWORD)@agentshield-redis-master:6379/1"
    # Provider API keys are injected via separate K8s Secrets mounted as env vars:
    #   kubectl create secret generic llm-provider-keys \
    #     --from-literal=OPENAI_API_KEY=<key> \
    #     --from-literal=ANTHROPIC_API_KEY=<key>
    OPENAI_API_KEY:
      valueFrom:
        secretKeyRef:
          name: llm-provider-keys
          key: OPENAI_API_KEY
    ANTHROPIC_API_KEY:
      valueFrom:
        secretKeyRef:
          name: llm-provider-keys
          key: ANTHROPIC_API_KEY

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── OPA standalone (local sub-chart — policy bundle server / audit) ────────────
# Note: per-agent OPA sidecars are injected by the Deploy Controller, not this chart.
# This sub-chart runs a standalone OPA instance for policy bundle hosting and audit.
opa:
  enabled: false

  replicaCount: 1

  image:
    repository: openpolicyagent/opa
    tag: "0.69.0-static"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8181

  args:
    - run
    - "--server"
    - "--addr=0.0.0.0:8181"
    - "--bundle=/policies/"
    - "--log-level=info"

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ── AgentShield Studio (local sub-chart) ──────────────────────────────────────
studio:
  enabled: true

  replicaCount: 1

  image:
    repository: registry.internal/agentshield/studio
    # E-2: rebuilt alongside the eval-v2 slice
    # POC-2: per-agent attributed bubbles + eval transcript + share-context toggle
    # 0.1.145: Providers form adds Ollama (base_url + freeform model)
    # 0.1.146: POC-4 Knowledge Base pages + citation chips
    # 0.1.147: POC-5 Conversations UI (sidebar + standalone page + docked History + deployment tab + nav) — one image, all frontends
    # 0.1.149: Credentials page — "no key set" badge + require value on create/empty-shell edit (has_credentials)
    # 0.1.150: Workflows — reactive-workflow chat (WorkflowChatPage + Open Chat + endpoint) + editable Settings
    # 0.1.151: workflow chat inline HITL panel + resume; Conversations + Memory tabs on workflow deployment
    # 0.1.152: Knowledge Bases picker in agent create + settings (special config); knowledge_search hidden from tools
    # 0.1.153: data-testid="tools-picker" on the Tools list (scopes the Playwright knowledge_search-hidden assertion)
    # 0.1.154: workflow deployment Conversations tab → GET /workflows/{id}/conversations
    # 0.1.155: knowledge_search leak class-fix — shared ToolsPicker/KnowledgeBasePicker across all 3
    #   agent-editing surfaces (Create, Settings, Edit modal); modal now hides knowledge_search + has KB picker
    # 0.1.156: workflow ledger G1+G2 frontend (rehydrate chat + Memory tab) + HITL 2nd-gate re-surface
    tag: "0.1.156"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 80

  env:
    VITE_REGISTRY_API_URL: "http://agentshield-registry-api:8000"
    VITE_LANGFUSE_HOST: "http://agentshield-langfuse-web:3000"

  # Suggested models shown in the LLM Providers form, per provider. Served to the
  # SPA at runtime via /config.json (nginx ConfigMap), so this list is DYNAMIC —
  # add a model here + `helm upgrade` (or edit the ConfigMap + restart the studio
  # pod) and it appears in the form with NO image rebuild. Ollama models are
  # user-pulled, so the form still accepts any freeform model string; this is a
  # suggestion/autocomplete list, not an allow-list.
  providerModels:
    ollama:
      - gemma4:12b-mlx
      - qwen2.5-coder:32b
      - mistral-small:24b

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  ingress:
    enabled: false  # Enable and set hostname for external access
    # hostname: studio.agentshield.internal
